blueprint:
  name: Device Availability Checker (label_id support)
  description: |
    Checks device availability and battery levels.
    Supports excluding entities/devices/areas/labels via target selector.

  domain: automation

  input:
    check_battery:
      name: Battery warning level
      default: 20
      selector:
        number:
          min: 5
          max: 100
          step: 5
          mode: slider
          unit_of_measurement: "%"

    check_unavailable:
      name: Check unavailable?
      default: false
      selector:
        boolean:

    trigger_time:
      name: Time of day
      default: "10:00:00"
      selector:
        time:

    trigger_day:
      name: Days of week
      default:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "6"
        - "7"
      selector:
        select:
          multiple: true
          options:
            - label: Monday
              value: "1"
            - label: Tuesday
              value: "2"
            - label: Wednesday
              value: "3"
            - label: Thursday
              value: "4"
            - label: Friday
              value: "5"
            - label: Saturday
              value: "6"
            - label: Sunday
              value: "7"

    exclude:
      name: Exclude items
      selector:
        target:

    actions:
      name: Actions
      selector:
        action:

variables:
  trigger_day: !input trigger_day
  check_battery: !input check_battery
  check_unavailable: !input check_unavailable
  exclude: !input exclude

  items: >
    {% set entities = namespace(data=[]) %}
    {% set devices = namespace(data=[]) %}

    {% macro is_label_excluded(entity_id) %}
      {% if exclude.label_id is defined %}
        {% set labels = label_ids(entity_id) | default([]) %}
        {% for lbl in labels %}
          {% if lbl in exclude.label_id %}
            {{ true }}
          {% endif %}
        {% endfor %}
      {% endif %}
      {{ false }}
    {% endmacro %}

    {# 1. UNAVAILABLE ENTITIES #}
    {% if check_unavailable %}
      {% for state in states | selectattr('state','eq','unavailable') %}
        {% set add = true %}

        {% if area_id(state.entity_id) == None or area_name(state.entity_id)[0:1] == '_' %}
          {% set add = false %}
        {% endif %}

        {% if exclude.entity_id is defined and state.entity_id in exclude.entity_id %}
          {% set add = false %}
        {% endif %}

        {% if exclude.area_id is defined and area_id(state.entity_id) in exclude.area_id %}
          {% set add = false %}
        {% endif %}

        {% if is_label_excluded(state.entity_id) %}
          {% set add = false %}
        {% endif %}

        {% if add %}
          {% set entities.data = entities.data + [{
            'entity_id': state.entity_id,
            'device_id': device_id(state.entity_id),
            'area_id': area_id(state.entity_id),
            'state': state.state
          }] %}
        {% endif %}
      {% endfor %}
    {% endif %}

    {# 2. BINARY SENSORS (battery) #}
    {% for state in states.binary_sensor
      | rejectattr('attributes.device_class','undefined')
      | selectattr('attributes.device_class','eq','battery')
      | selectattr('state','eq','on') %}

      {% set add = true %}

      {% if area_id(state.entity_id) == None or area_name(state.entity_id)[0:1] == '_' %}
        {% set add = false %}
      {% endif %}

      {% if exclude.entity_id is defined and state.entity_id in exclude.entity_id %}
        {% set add = false %}
      {% endif %}

      {% if exclude.area_id is defined and area_id(state.entity_id) in exclude.area_id %}
        {% set add = false %}
      {% endif %}

      {% if is_label_excluded(state.entity_id) %}
        {% set add = false %}
      {% endif %}

      {% if add %}
        {% set entities.data = entities.data + [{
          'entity_id': state.entity_id,
          'device_id': device_id(state.entity_id),
          'area_id': area_id(state.entity_id),
          'state': state.state
        }] %}
      {% endif %}
    {% endfor %}

    {# 3. SENSORS (battery) #}
    {% for state in states.sensor
      | rejectattr('state','eq','unavailable')
      | rejectattr('attributes.device_class','undefined')
      | selectattr('attributes.device_class','eq','battery') %}

      {% set add = true %}

      {% if area_id(state.entity_id) == None or area_name(state.entity_id)[0:1] == '_' %}
        {% set add = false %}
      {% endif %}

      {% if exclude.entity_id is defined and state.entity_id in exclude.entity_id %}
        {% set add = false %}
      {% endif %}

      {% if exclude.area_id is defined and area_id(state.entity_id) in exclude.area_id %}
        {% set add = false %}
      {% endif %}

      {% if is_label_excluded(state.entity_id) %}
        {% set add = false %}
      {% endif %}

      {% if check_battery is defined and (state.state | int(-1)) >= (check_battery | int(0)) %}
        {% set add = false %}
      {% endif %}

      {% if add %}
        {% set entities.data = entities.data + [{
          'entity_id': state.entity_id,
          'device_id': device_id(state.entity_id),
          'area_id': area_id(state.entity_id),
          'state': state.state
        }] %}
      {% endif %}
    {% endfor %}

    {# 4. UNIQUE DEVICES #}
    {% for entity in entities.data | unique(attribute='device_id') %}
      {% set add = true %}

      {% if area_id(entity.device_id) == None or area_name(entity.device_id)[0:1] == '_' %}
        {% set add = false %}
      {% endif %}

      {% if exclude.device_id is defined and entity.device_id in exclude.device_id %}
        {% set add = false %}
      {% endif %}

      {% if exclude.area_id is defined and area_id(entity.device_id) in exclude.area_id %}
        {% set add = false %}
      {% endif %}

      {% if is_label_excluded(entity.entity_id) %}
        {% set add = false %}
      {% endif %}

      {% if check_battery is defined and (entity.state | int(-1)) >= (check_battery | int(0)) %}
        {% set add = false %}
      {% endif %}

      {% if add %}
        {% set friendly = device_attr(entity.device_id,'name') %}
        {% if state_attr(entity.entity_id,'friendly_name') %}
          {% set friendly = state_attr(entity.entity_id,'friendly_name') %}
        {% endif %}
        {% if device_attr(entity.device_id,'name_by_user') %}
          {% set friendly = device_attr(entity.device_id,'name_by_user') %}
        {% endif %}

        {% set devices.data = devices.data + [{
          'device_id': entity.device_id,
          'device_name': device_attr(entity.entity_id,'name'),
          'friendly_name': friendly,
          'area_id': area_id(entity.entity_id),
          'state': entity.state
        }] %}
      {% endif %}
    {% endfor %}

    {{ devices.data }}

trigger:
  - platform: time
    at: !input trigger_time

condition:
  - "{{ ((items | length) > 0) and ((now().isoweekday() | int) == (trigger_day[now().isoweekday()-1] | int)) }}"

action:
  - choose: []
    default: !input actions

mode: single
